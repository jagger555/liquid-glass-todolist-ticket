appId: com.jagger555.liquid-glass-todolist-ticket
productName: Liquid Glass TodoList Ticket
directories:
  buildResources: build
  output: build-output
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/*'
asarUnpack:
  - resources/**
afterPack: scripts/after-pack-macos.cjs
win:
  executableName: LiquidGlassTodoList
  sign: false
  target:
    - target: nsis
      arch:
        - x64
        - ia32
nsis:
  artifactName: LiquidGlassTodoList-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: LiquidGlassTodoList-${version}-${arch}.${ext}
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
dmg:
  artifactName: LiquidGlassTodoList-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
